name: Actualizar precios

on:
  schedule:
    # 18:00 y 20:00 UTC, de lunes a viernes (tras el cierre de mercado y
    # la publicación habitual del valor liquidativo). Dos pasadas por si
    # el fondo lo publica tarde.
    - cron: '0 18 * * 1-5'
    - cron: '0 20 * * 1-5'
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña "Actions"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar precios
        run: python3 scripts/fetch_prices.py

      - name: Publicar cambios
        run: |
          git config user.name "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Actualiza precios $(date -u +%F)"
          git push
