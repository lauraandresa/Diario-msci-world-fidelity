name: Actualizar precios

on:
  schedule:
    # Varios intentos repartidos por la tarde/noche (hora UTC), evitando
    # la hora en punto. GitHub NO garantiza que un cron se ejecute --
    # documentan que en días de carga alta puede saltarse la ejecución
    # entera sin avisar. Con 2 intentos, que fallen los dos el mismo día
    # es más probable de lo que parece; con 4 repartidos, es mucho más
    # raro que fallen todos a la vez.
    - cron: '7 17 * * 1-5'
    - cron: '12 18 * * 1-5'
    - cron: '23 19 * * 1-5'
    - cron: '41 21 * * 1-5'
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña "Actions"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: pip install --quiet yfinance

      - name: Descargar precios
        run: python3 scripts/fetch_prices.py

      - name: Publicar cambios
        run: |
          git config user.name "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Actualiza precios $(date -u +%F)"
          git push
