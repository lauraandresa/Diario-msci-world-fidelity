name: Actualizar precios

on:
  schedule:
    - cron: '0 18 * * 1-5'
    - cron: '0 20 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar precios
        run: python3 scripts/fetch_prices.py

      - name: Publicar cambios
        run: |
          git config user.name "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Actualiza precios $(date -u +%F)"
          git push
